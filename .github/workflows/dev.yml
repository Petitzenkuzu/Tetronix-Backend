name: Development

on: 
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  PRODUCTION: false
  PORT: 8080
  TEST_DATABASE_URL: postgres://user:password@localhost:5432/test_db
  SESSION_SECRET_KEY: test_secret_key_for_ci

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
    
    - name: Init database schema
      run: PGPASSWORD=password psql -h localhost -U user -d test_db -f Schema.sql

    - name: Build
      run: cargo build

    - name: Run tests
      run: cargo test

    - name: Check formatting
      run: cargo fmt --all --check

    - name: Check clippy
      run: cargo clippy --all-targets -- -D warnings